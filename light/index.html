/* ===== Demo 5 Premium Calorie Calculator Insert ===== */
.demo5-calorie {
  position: relative;
  overflow: hidden;
  background: #F4F1EA;
  padding: clamp(88px, 11vw, 140px) 0;
  border-top: 1px solid rgba(10,14,26,0.08);
  border-bottom: 1px solid rgba(10,14,26,0.08);
  font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #0A0E1A;
}
.demo5-calorie::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: .55;
  background-image:
    radial-gradient(circle at 17% 22%, rgba(0,153,204,.12), transparent 34%),
    radial-gradient(circle at 82% 70%, rgba(122,184,0,.11), transparent 34%),
    linear-gradient(rgba(10,14,26,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,14,26,.035) 1px, transparent 1px);
  background-size: auto, auto, 42px 42px, 42px 42px;
}
.demo5-calorie__wrap {
  width: min(1240px, calc(100% - 48px));
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.demo5-calorie__head {
  text-align: center;
  margin: 0 auto clamp(38px, 6vw, 62px);
  max-width: 780px;
}
.demo5-calorie__eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: #0099CC;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .24em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.demo5-calorie__eyebrow::before,
.demo5-calorie__eyebrow::after {
  content: '';
  width: 38px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #0099CC);
}
.demo5-calorie__eyebrow::after { background: linear-gradient(90deg, #0099CC, transparent); }
.demo5-calorie__title {
  font-family: 'Syne', system-ui, sans-serif;
  font-size: clamp(2.55rem, 7vw, 5.5rem);
  line-height: .92;
  letter-spacing: -0.06em;
  font-weight: 800;
  margin: 0;
}
.demo5-calorie__title span {
  background: linear-gradient(120deg, #0099CC, #7AB800);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.demo5-calorie__lead {
  margin: 20px auto 0;
  max-width: 620px;
  color: #5A6478;
  font-size: clamp(1rem, 1.7vw, 1.16rem);
  line-height: 1.7;
}
.demo5-calorie__grid {
  display: grid;
  grid-template-columns: .86fr 1.14fr;
  gap: clamp(20px, 3vw, 30px);
  align-items: stretch;
}
.demo5-calorie__form,
.demo5-calorie__results {
  border: 1px solid rgba(10,14,26,.09);
  background: rgba(255,255,255,.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 30px;
  box-shadow: 0 28px 90px rgba(10,14,26,.08), inset 0 1px 0 rgba(255,255,255,.72);
}
.demo5-calorie__form { padding: clamp(22px, 3vw, 32px); }
.demo5-calorie__results { padding: clamp(22px, 3vw, 32px); display: flex; flex-direction: column; gap: 20px; }
.demo5-calorie__panel-title {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'Syne', system-ui, sans-serif;
  font-size: 1.22rem;
  font-weight: 800;
  letter-spacing: -0.025em;
  margin-bottom: 24px;
}
.demo5-calorie__icon {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  display: inline-grid;
  place-items: center;
  color: #0099CC;
  background: linear-gradient(135deg, rgba(0,153,204,.12), rgba(122,184,0,.12));
}
.demo5-calorie__fields { display: grid; gap: 16px; }
.demo5-calorie__row {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 14px;
  align-items: center;
}
.demo5-calorie__row label,
.demo5-calorie__label {
  font-weight: 800;
  font-size: .88rem;
  color: #0A0E1A;
}
.demo5-calorie__control {
  width: 100%;
  height: 54px;
  border-radius: 15px;
  border: 1px solid rgba(10,14,26,.1);
  background: rgba(255,255,255,.92);
  color: #0A0E1A;
  padding: 0 16px;
  outline: none;
  box-shadow: 0 10px 25px rgba(10,14,26,.035);
  transition: .2s ease;
}
.demo5-calorie__control:focus {
  border-color: rgba(0,153,204,.75);
  box-shadow: 0 0 0 4px rgba(0,153,204,.12), 0 10px 25px rgba(10,14,26,.05);
}
.demo5-calorie__gender {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.demo5-calorie__gender button {
  height: 50px;
  border-radius: 15px;
  border: 1px solid rgba(10,14,26,.1);
  background: rgba(255,255,255,.72);
  color: #5A6478;
  font-weight: 800;
  transition: .2s ease;
}
.demo5-calorie__gender button.is-active {
  color: #0099CC;
  border-color: rgba(0,153,204,.55);
  background: rgba(0,153,204,.08);
  box-shadow: 0 0 0 4px rgba(0,153,204,.07);
}
.demo5-calorie__button {
  height: 60px;
  border-radius: 18px;
  margin-top: 8px;
  width: 100%;
  background: linear-gradient(135deg, #0099CC, #7AB800);
  color: #fff;
  font-weight: 900;
  letter-spacing: .02em;
  box-shadow: 0 18px 42px rgba(0,153,204,.28);
  transition: .2s ease;
}
.demo5-calorie__button:hover { transform: translateY(-2px); box-shadow: 0 22px 48px rgba(0,153,204,.34); }
.demo5-calorie__privacy {
  display: flex;
  justify-content: center;
  gap: 8px;
  color: rgba(90,100,120,.75);
  font-size: .82rem;
  margin-top: 20px;
}
.demo5-calorie__hero-result {
  display: grid;
  grid-template-columns: 1fr 180px;
  gap: 18px;
  align-items: center;
  border: 1px solid rgba(10,14,26,.08);
  background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(244,241,234,.56));
  border-radius: 24px;
  padding: 24px;
}
.demo5-calorie__kicker { color:#5A6478; font-weight:800; font-size:.88rem; }
.demo5-calorie__big {
  font-family: 'Syne', system-ui, sans-serif;
  font-size: clamp(3rem, 6vw, 5.2rem);
  line-height: .92;
  font-weight: 800;
  letter-spacing: -0.065em;
  color: #0099CC;
  margin: 8px 0 6px;
}
.demo5-calorie__big small { font-size: .28em; letter-spacing: 0; color: #5A6478; font-family: 'DM Sans', sans-serif; }
.demo5-calorie__sub { color: #5A6478; font-size: .9rem; }
.demo5-calorie__ring {
  width: 156px;
  height: 156px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  margin-left: auto;
  background: conic-gradient(#0099CC 0 42%, #7AB800 42% 68%, #8B7BFF 68% 100%);
  box-shadow: inset 0 0 0 16px rgba(255,255,255,.68), 0 16px 38px rgba(10,14,26,.08);
}
.demo5-calorie__ring-inner {
  width: 108px;
  height: 108px;
  border-radius: 50%;
  background: rgba(255,255,255,.95);
  display: grid;
  place-items: center;
  text-align: center;
  font-weight: 900;
  color: #0A0E1A;
  box-shadow: inset 0 0 0 1px rgba(10,14,26,.05);
}
.demo5-calorie__ring-inner span { display:block; color:#5A6478; font-size:.72rem; font-weight:700; }
.demo5-calorie__macro-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}
.demo5-calorie__macro {
  border: 1px solid rgba(10,14,26,.08);
  border-radius: 22px;
  background: rgba(255,255,255,.86);
  padding: 18px;
  box-shadow: 0 14px 28px rgba(10,14,26,.04);
}
.demo5-calorie__macro-label { color:#5A6478; font-size:.82rem; font-weight:800; margin-bottom:7px; }
.demo5-calorie__macro-value { font-family:'Syne', sans-serif; font-size:2rem; font-weight:800; letter-spacing:-.04em; }
.demo5-calorie__macro small { color:#5A6478; font-weight:700; }
.demo5-calorie__bar { height: 8px; background: rgba(10,14,26,.07); border-radius:99px; overflow:hidden; margin-top:12px; }
.demo5-calorie__bar i { display:block; height:100%; border-radius:99px; background: var(--bar); width: var(--w); }
.demo5-calorie__meal-grid {
  border: 1px solid rgba(10,14,26,.08);
  border-radius: 22px;
  background: rgba(255,255,255,.74);
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  overflow: hidden;
}
.demo5-calorie__meal {
  padding: 17px;
  border-right: 1px solid rgba(10,14,26,.07);
}
.demo5-calorie__meal:last-child { border-right: 0; }
.demo5-calorie__meal b { display:block; font-size:.88rem; }
.demo5-calorie__meal span { display:block; color:#5A6478; font-size:.8rem; margin-top:4px; }
.demo5-calorie__note {
  border: 1px solid rgba(0,153,204,.16);
  background: rgba(0,153,204,.06);
  color: #5A6478;
  padding: 14px 16px;
  border-radius: 16px;
  font-size: .88rem;
  line-height: 1.55;
}
.demo5-calorie__note strong { color:#0A0E1A; }
@media (max-width: 980px) {
  .demo5-calorie__grid { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .demo5-calorie__wrap { width: min(100% - 28px, 1240px); }
  .demo5-calorie__row { grid-template-columns: 1fr; gap: 8px; }
  .demo5-calorie__hero-result { grid-template-columns: 1fr; }
  .demo5-calorie__ring { margin: 0 auto; }
  .demo5-calorie__macro-grid, .demo5-calorie__meal-grid { grid-template-columns: 1fr; }
  .demo5-calorie__meal { border-right: 0; border-bottom: 1px solid rgba(10,14,26,.07); }
  .demo5-calorie__meal:last-child { border-bottom: 0; }
}

<script>
(function(){
  function fmt(n){ return Math.round(n).toLocaleString('tr-TR'); }
  function insertCalorie(){
    if(document.getElementById('calorie')) return;
    var services = document.getElementById('services');
    if(!services || !services.parentNode) return;
    var section = document.createElement('section');
    section.id = 'calorie';
    section.className = 'demo5-calorie';
    section.innerHTML = `
      <div class="demo5-calorie__wrap">
        <div class="demo5-calorie__head">
          <div class="demo5-calorie__eyebrow">Hedefine ulaş, veriye göre başla</div>
          <h2 class="demo5-calorie__title">Kalori <span>Hesaplayıcı</span></h2>
          <p class="demo5-calorie__lead">Vücudunu tanı, hedefin için yaklaşık günlük kalori ve makro ihtiyacını gör. Bu hesap başlangıç noktasıdır; gerçek sonuç haftalık takip ve revizyonla gelir.</p>
        </div>
        <div class="demo5-calorie__grid">
          <div class="demo5-calorie__form">
            <div class="demo5-calorie__panel-title"><span class="demo5-calorie__icon">⌁</span> Hesaplama Bilgileri</div>
            <div class="demo5-calorie__fields">
              <div class="demo5-calorie__row">
                <div class="demo5-calorie__label">Cinsiyet</div>
                <div class="demo5-calorie__gender" role="group" aria-label="Cinsiyet">
                  <button type="button" class="is-active" data-gender="male">♂ Erkek</button>
                  <button type="button" data-gender="female">♀ Kadın</button>
                </div>
              </div>
              <div class="demo5-calorie__row"><label for="calc-age">Yaş</label><input id="calc-age" class="demo5-calorie__control" type="number" min="16" max="80" value="28"></div>
              <div class="demo5-calorie__row"><label for="calc-height">Boy</label><input id="calc-height" class="demo5-calorie__control" type="number" min="140" max="230" value="180"></div>
              <div class="demo5-calorie__row"><label for="calc-weight">Kilo</label><input id="calc-weight" class="demo5-calorie__control" type="number" min="40" max="220" value="78"></div>
              <div class="demo5-calorie__row"><label for="calc-goal">Hedef</label><select id="calc-goal" class="demo5-calorie__control"><option value="cut">Yağ Kaybı</option><option value="recomp">Sıkılaşma / Rekomp</option><option value="maintain">Korumak</option><option value="gain" selected>Kas Kütlesi Artırma</option></select></div>
              <div class="demo5-calorie__row"><label for="calc-activity">Aktivite</label><select id="calc-activity" class="demo5-calorie__control"><option value="1.2">Düşük</option><option value="1.375">Hafif</option><option value="1.55" selected>Orta · Haftada 3–5 gün</option><option value="1.725">Yüksek</option><option value="1.9">Çok yüksek</option></select></div>
              <button class="demo5-calorie__button" id="calc-button" type="button">Hesapla</button>
            </div>
            <div class="demo5-calorie__privacy">♡ Bilgiler demo içinde hesaplanır, dışarı gönderilmez.</div>
          </div>
          <div class="demo5-calorie__results">
            <div class="demo5-calorie__panel-title"><span class="demo5-calorie__icon">↗</span> Sonuçların</div>
            <div class="demo5-calorie__hero-result">
              <div><div class="demo5-calorie__kicker">Günlük Kalori</div><div class="demo5-calorie__big"><span id="calc-calorie">2650</span> <small>kcal</small></div><div class="demo5-calorie__sub" id="calc-target-copy">Kas kazanımı için önerilen başlangıç hedefi.</div></div>
              <div class="demo5-calorie__ring"><div class="demo5-calorie__ring-inner"><div><strong id="calc-ring">2650</strong><span>kcal</span></div></div></div>
            </div>
            <div class="demo5-calorie__macro-grid">
              <div class="demo5-calorie__macro" style="--bar:#0099CC;--w:25%"><div class="demo5-calorie__macro-label">Protein</div><div class="demo5-calorie__macro-value"><span id="calc-protein">156</span><small> g</small></div><div class="demo5-calorie__bar"><i></i></div></div>
              <div class="demo5-calorie__macro" style="--bar:#7AB800;--w:50%"><div class="demo5-calorie__macro-label">Karbonhidrat</div><div class="demo5-calorie__macro-value"><span id="calc-carb">331</span><small> g</small></div><div class="demo5-calorie__bar"><i></i></div></div>
              <div class="demo5-calorie__macro" style="--bar:#8B7BFF;--w:25%"><div class="demo5-calorie__macro-label">Yağ</div><div class="demo5-calorie__macro-value"><span id="calc-fat">74</span><small> g</small></div><div class="demo5-calorie__bar"><i></i></div></div>
            </div>
            <div class="demo5-calorie__meal-grid">
              <div class="demo5-calorie__meal"><b>Kahvaltı</b><span id="meal-1">663 kcal · %25</span></div>
              <div class="demo5-calorie__meal"><b>Öğle</b><span id="meal-2">795 kcal · %30</span></div>
              <div class="demo5-calorie__meal"><b>Akşam</b><span id="meal-3">663 kcal · %25</span></div>
              <div class="demo5-calorie__meal"><b>Ara Öğün</b><span id="meal-4">530 kcal · %20</span></div>
            </div>
            <div class="demo5-calorie__note"><strong>Not:</strong> Bu değerler tahminidir. Gerçek plan; uyku, ölçüm, antrenman performansı, iştah ve haftalık gidişata göre koç tarafından güncellenmelidir.</div>
          </div>
        </div>
      </div>`;
    services.insertAdjacentElement('afterend', section);
    initCalc(section);
  }
  function initCalc(root){
    var gender = 'male';
    root.querySelectorAll('[data-gender]').forEach(function(btn){
      btn.addEventListener('click', function(){
        gender = btn.getAttribute('data-gender');
        root.querySelectorAll('[data-gender]').forEach(function(b){b.classList.remove('is-active')});
        btn.classList.add('is-active');
        calc();
      });
    });
    ['calc-age','calc-height','calc-weight','calc-goal','calc-activity'].forEach(function(id){
      var el = root.querySelector('#'+id);
      if(el){ el.addEventListener('input', calc); el.addEventListener('change', calc); }
    });
    var button = root.querySelector('#calc-button');
    if(button) button.addEventListener('click', calc);
    function val(id){ return Number(root.querySelector('#'+id).value || 0); }
    function goalDelta(goal){ return goal === 'cut' ? -400 : goal === 'recomp' ? -150 : goal === 'gain' ? 250 : 0; }
    function goalCopy(goal){ return goal === 'cut' ? 'Yağ kaybı için kontrollü başlangıç hedefi.' : goal === 'recomp' ? 'Sıkılaşma için dengeli başlangıç hedefi.' : goal === 'gain' ? 'Kas kazanımı için önerilen başlangıç hedefi.' : 'Mevcut formu korumak için bakım hedefi.'; }
    function calc(){
      var age = Math.max(16, val('calc-age'));
      var height = Math.max(120, val('calc-height'));
      var weight = Math.max(35, val('calc-weight'));
      var activity = val('calc-activity') || 1.55;
      var goal = root.querySelector('#calc-goal').value;
      var bmr = 10*weight + 6.25*height - 5*age + (gender === 'male' ? 5 : -161);
      var maintenance = Math.round(bmr * activity);
      var target = Math.max(1200, Math.round(maintenance + goalDelta(goal)));
      var protein = Math.round(weight * 2);
      var fat = Math.round((target * .25) / 9);
      var carbs = Math.max(0, Math.round((target - (protein*4) - (fat*9)) / 4));
      root.querySelector('#calc-calorie').textContent = fmt(target);
      root.querySelector('#calc-ring').textContent = fmt(target);
      root.querySelector('#calc-target-copy').textContent = goalCopy(goal);
      root.querySelector('#calc-protein').textContent = fmt(protein);
      root.querySelector('#calc-carb').textContent = fmt(carbs);
      root.querySelector('#calc-fat').textContent = fmt(fat);
      root.querySelector('#meal-1').textContent = fmt(target*.25) + ' kcal · %25';
      root.querySelector('#meal-2').textContent = fmt(target*.30) + ' kcal · %30';
      root.querySelector('#meal-3').textContent = fmt(target*.25) + ' kcal · %25';
      root.querySelector('#meal-4').textContent = fmt(target*.20) + ' kcal · %20';
    }
    calc();
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', insertCalorie); else setTimeout(insertCalorie, 0);
})();
</script>


<script id="og-capture-controller">
  (function(){
    if (new URLSearchParams(window.location.search).get('og') !== '1') return;
    var path = window.location.pathname.replace(/\/$/, '').split('/').pop() || 'index';

    // Deterministic capture rules. These are not aesthetic guesses; they bind capture to a known DOM target.
    var rules = {
      index:    { target: '[data-og-target="primary"], #demos', offset: 0, iframes: true },
      gold:     { target: '[data-og-target="primary"], .hero', offset: 0 },
      dark:     { target: '[data-og-target="primary"], #root, main, .hero', offset: 180 },
      pilates:  { target: '[data-og-target="primary"], #hero, .hero', offset: 0 },
      light:    { target: '[data-og-target="primary"], #root, main, .hero', offset: 180 },
      classic:  { target: '[data-og-target="primary"], #hero, .hero', offset: 0 },
      feminine: { target: '[data-og-target="primary"], #hero, .hero', offset: 0 },
      neon:     { target: '[data-og-target="primary"], #hero, .hero', offset: 0 }
    };

    function forceFinalHeroState(){
      // For scroll-scrub / GSAP pages: force the final hero composition visible.
      var finalVisible = [
        '.hero__layout', '#hero-layout', '.hero__content', '#hero-content', '.hero__visual', '#hero-visual',
        '.hero__visual-aux', '.hero__panel', '.hero__panel--form', '.hero__panel--track',
        '.hero__panel--progress', '.hero__panel--checkin', '.float-card',
        '.hero__badge', '.hero__title', '.hero__lede', '.hero__actions', '.hero__metrics',
        '.reveal', '[class*="reveal"]'
      ].join(',');
      document.querySelectorAll(finalVisible).forEach(function(el){
        el.style.opacity = '1';
        el.style.visibility = 'visible';
        el.style.transform = 'none';
        el.style.filter = 'none';
        el.style.clipPath = 'none';
      });
      document.querySelectorAll('#hero-brand-intro, .hero__brand-intro, .cursor, .scroll-progress, .preloader, .hero-loader').forEach(function(el){
        el.style.display = 'none';
        el.style.opacity = '0';
        el.style.visibility = 'hidden';
      });
      var stage = document.querySelector('#hero-stage');
      if (stage) stage.style.transform = 'none';
      if (window.gsap) {
        try {
          window.gsap.set(finalVisible, {opacity:1, visibility:'visible', x:0, y:0, scale:1, rotation:0, clearProps:'filter,clipPath'});
          window.gsap.set('#hero-brand-intro, .hero__brand-intro', {display:'none', opacity:0});
        } catch(e) {}
      }
      if (window.ScrollTrigger) {
        try { window.ScrollTrigger.getAll().forEach(function(st){ st.disable(false); }); } catch(e) {}
      }
    }

    function stabilize(){
      document.documentElement.setAttribute('data-og-capture','1');
      if (document.body) document.body.setAttribute('data-og-capture','1');
      var rule = rules[path] || rules.index;

      if (rule.iframes) {
        document.querySelectorAll('iframe').forEach(function(frame){
          try {
            var src = frame.getAttribute('src') || '';
            var match = src.match(/fatihtopcu\.online\/(gold|dark|pilates|light|classic|feminine|neon)\//);
            if (match) frame.setAttribute('src', '/' + match[1] + '/?og=1');
          } catch(e) {}
        });
      }

      forceFinalHeroState();
      var el = document.querySelector(rule.target);
      if (el) {
        try { el.setAttribute('data-og-selected','true'); } catch(e) {}
        if (path === 'index') {
          el.scrollIntoView({block:'start', inline:'nearest'});
        } else {
          window.scrollTo(0, rule.offset || 0);
        }
      } else {
        window.scrollTo(0, rule.offset || 0);
      }

      setTimeout(function(){
        forceFinalHeroState();
        if (path === 'index' && el) el.scrollIntoView({block:'start', inline:'nearest'});
        else window.scrollTo(0, rule.offset || 0);
        document.documentElement.setAttribute('data-og-ready','1');
      }, 500);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function(){ setTimeout(stabilize, 300); });
    } else {
      setTimeout(stabilize, 300);
    }
    window.addEventListener('load', function(){ setTimeout(stabilize, 800); });
  })();
</script>
